<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabERP · Dashboard Keuangan Proyek</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --g:#27500A;--g2:#3B6D11;--gl:#EAF3DE;
  --t:#085041;--tl:#E1F5EE;
  --p:#3C3489;--pl:#EEEDFE;
  --a:#633806;--al:#FAEEDA;
  --r:#A32D2D;--rl:#FCEBEB;
  --b:#0C447C;--bl:#E6F1FB;
  --gr:#888780;--grl:#F5F5F4;
  --tx:#1C1B19;--tx2:#5F5E5A;
  --br:#E5E3DC;--bg:#F7F6F2;--cd:#FFFFFF;
  --rad:10px;--sh:0 1px 4px rgba(0,0,0,.08)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px}
.hdr{background:var(--g);color:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr h1{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%;background:#4ade80;display:inline-block;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.hdr-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#lupd{font-size:11px;opacity:.75}
.rbtn{font-size:11px;padding:4px 11px;border-radius:5px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.12);color:#fff;cursor:pointer}
.rbtn:hover{background:rgba(255,255,255,.25)}
.fbar{background:var(--cd);border-bottom:1px solid var(--br);padding:9px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.fbar label{font-size:11px;color:var(--tx2);font-weight:500}
.fbar select{font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid var(--br);background:#fff;cursor:pointer}
.body{padding:18px 20px;max-width:1380px;margin:0 auto}
.slbl{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin:0 0 9px}
.mg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:18px}
.mc{background:var(--cd);border-radius:var(--rad);padding:13px 15px;border:1px solid var(--br);box-shadow:var(--sh);border-top:3px solid var(--ac,#ccc)}
.ml{font-size:10px;color:var(--tx2);margin-bottom:5px;font-weight:500}
.mv{font-size:20px;font-weight:600;line-height:1.1}
.ms{font-size:10px;color:var(--tx2);margin-top:3px}
.cg{display:grid;gap:14px;margin-bottom:18px}
.g2{grid-template-columns:repeat(2,minmax(0,1fr))}
.g21{grid-template-columns:minmax(0,1.6fr) minmax(0,1fr)}
.card{background:var(--cd);border-radius:var(--rad);padding:15px;border:1px solid var(--br);box-shadow:var(--sh)}
.ct{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.cw{position:relative;height:200px}
.cws{position:relative;height:165px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:6px 9px;background:var(--grl);color:var(--tx2);font-weight:600;font-size:10px;border-bottom:1px solid var(--br);white-space:nowrap}
td{padding:6px 9px;border-bottom:1px solid var(--br);color:var(--tx);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAF8}
.pill{display:inline-block;font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500;white-space:nowrap}
.pg{background:var(--gl);color:var(--g2)}.pa{background:var(--al);color:var(--a)}
.pr{background:var(--rl);color:var(--r)}.pb{background:var(--bl);color:var(--b)}.pgr{background:var(--grl);color:var(--gr)}
.pt{flex:1;height:6px;background:var(--grl);border-radius:3px;overflow:hidden;min-width:50px}
.pf{height:100%;border-radius:3px;background:var(--b)}
.wfw{display:flex;align-items:flex-end;gap:5px;height:130px;margin-top:4px}
.wfc{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0}
.wfb{flex:1;display:flex;align-items:flex-end;width:100%}
.wfbar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .5s}
.wfv{font-size:9px;font-weight:600;color:var(--tx);text-align:center;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.wfl{font-size:9px;color:var(--tx2);text-align:center;line-height:1.2}
.lgw{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.lg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--tx2)}
.lgd{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px}
.sp{width:34px;height:34px;border:3px solid var(--br);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:var(--rl);border:1px solid #f0b0b0;border-radius:var(--rad);padding:14px 18px;margin:18px;color:var(--r)}
.err a{color:var(--r)}
footer{text-align:center;padding:16px;font-size:11px;color:var(--tx2);border-top:1px solid var(--br);margin-top:4px}
footer a{color:var(--g)}
.acg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:9px}
.ac{background:var(--grl);border-radius:8px;padding:11px 13px;border:1px solid var(--br)}
.acn{font-size:10px;color:var(--tx2);margin-bottom:3px}
.acv{font-size:15px;font-weight:600}
.acs{font-size:10px;color:var(--tx2);margin-top:2px}
.badge-live{background:rgba(74,222,128,.2);border:1px solid rgba(74,222,128,.4);color:#166534;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500}
@media(max-width:860px){.mg{grid-template-columns:repeat(2,1fr)}.g2,.g21{grid-template-columns:1fr}.body{padding:12px}}
@media(max-width:480px){.mg{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="hdr">
  <h1><span class="dot" id="dot"></span>LabERP &middot; Dashboard Keuangan Proyek</h1>
  <div class="hdr-r">
    <span class="badge-live" id="srcBadge">● Live</span>
    <span id="lupd">Memuat...</span>
    <button class="rbtn" onclick="loadAll()">&#8635; Refresh</button>
  </div>
</div>

<div class="fbar">
  <label>Tahun</label>
  <select id="sYear" onchange="renderAll()">
    <option value="all">Semua</option>
    <option value="2025" selected>2025</option>
    <option value="2026">2026</option>
  </select>
  <label>Proyek</label>
  <select id="sProj" onchange="renderAll()"><option value="all">Semua Proyek</option></select>
</div>

<div id="mc">
  <div class="loading"><div class="sp"></div><p style="color:var(--tx2)">Mengambil data dari Google Sheets...</p></div>
</div>
<footer id="ft" style="display:none">
  LabERP Dashboard v1.0 &mdash;
  Data: <a href="https://docs.google.com/spreadsheets/d/1zxSk7IMrsak7yViHrbexFG1VAKmRO0Ezm0aGzNq3wTg" target="_blank">Google Sheets LabERP</a>
  &mdash; Auto-deploy via GitHub Actions setiap 6 jam
</footer>

<script>
const SID='1zxSk7IMrsak7yViHrbexFG1VAKmRO0Ezm0aGzNq3wTg';
// GIDs verified from spreadsheet URL
const GID={
  projects:'0',
  budget:'1362918701',
  transaksi:'1022458892',
  termin:'683807027',
  kontrak:'1290930633',
  pinjaman:'1822755740',
  profitsharing:'1559896030',

// FALLBACK DATA (dari dokumen spreadsheet yang sudah dibaca)
const DEMO={
  projects:[
    {project_id:'LBT-2025-001',nama_proyek:'Studi Kelayakan Trans Batam',client:'Dinas Perhubungan Batam',nilai_kontrak:'500000000',tanggal_mulai:'2025-01-10',tanggal_selesai:'2025-06-30',status:'Aktif',pic:'Budi Santoso'},
    {project_id:'LBT-2025-002',nama_proyek:'CBM Consultancy MRT Jakarta',client:'PT MRT Jakarta',nilai_kontrak:'750000000',tanggal_mulai:'2025-03-01',tanggal_selesai:'2025-09-30',status:'Aktif',pic:'Rina Dewi'},
    {project_id:'LBT-2025-003',nama_proyek:'GIS Reklame Batam',client:'PT MARU',nilai_kontrak:'200000000',tanggal_mulai:'2025-02-15',tanggal_selesai:'2025-05-31',status:'Selesai',pic:'Budi Santoso'},
  ],
  budget:[
    {budget_id:'BDG-001',project_id:'LBT-2025-001',pos_biaya:'Personel',deskripsi:'Honor tenaga ahli',nilai_rencana:'150000000',nilai_realisasi:'50000000'},
    {budget_id:'BDG-002',project_id:'LBT-2025-001',pos_biaya:'Material',deskripsi:'Perlengkapan survei',nilai_rencana:'30000000',nilai_realisasi:'15000000'},
    {budget_id:'BDG-003',project_id:'LBT-2025-001',pos_biaya:'Overhead',deskripsi:'Operasional kantor',nilai_rencana:'20000000',nilai_realisasi:'0'},
    {budget_id:'BDG-004',project_id:'LBT-2025-002',pos_biaya:'Personel',deskripsi:'Honor konsultan CBM',nilai_rencana:'200000000',nilai_realisasi:'80000000'},
    {budget_id:'BDG-005',project_id:'LBT-2025-002',pos_biaya:'Perjalanan',deskripsi:'Transport & akomodasi',nilai_rencana:'50000000',nilai_realisasi:'0'},
  ],
  transaksi:[
    {trx_id:'TRX-20250115-001',project_id:'LBT-2025-001',budget_id:'BDG-001',tanggal:'2025-01-15',jenis:'Keluar',kategori:'Personel',deskripsi:'Honor konsultan',jumlah:'50000000',status:'Approved',dicatat_oleh:'Admin'},
    {trx_id:'TRX-20250120-001',project_id:'LBT-2025-001',budget_id:'BDG-002',tanggal:'2025-01-20',jenis:'Keluar',kategori:'Material',deskripsi:'Pembelian alat ukur GPS',jumlah:'15000000',status:'Approved',dicatat_oleh:'Admin'},
    {trx_id:'TRX-20250201-001',project_id:'LBT-2025-002',budget_id:'BDG-004',tanggal:'2025-02-01',jenis:'Keluar',kategori:'Personel',deskripsi:'Honor konsultan CBM Feb',jumlah:'80000000',status:'Draft',dicatat_oleh:'Rina'},
  ],
  termin:[
    {termin_id:'TRM-001',project_id:'LBT-2025-001',no_termin:'Termin 1',nilai_bersih:'142500000',nilai_retensi:'7500000',tanggal_tagih:'2025-02-01',tanggal_bayar:'2025-02-15',status:'Lunas',nama_proyek:'Studi Kelayakan Trans Batam'},
    {termin_id:'TRM-002',project_id:'LBT-2025-001',no_termin:'Termin 2',nilai_bersih:'190000000',nilai_retensi:'10000000',tanggal_tagih:'2025-04-01',tanggal_bayar:'',status:'Sudah tagih',nama_proyek:'Studi Kelayakan Trans Batam'},
    {termin_id:'TRM-003',project_id:'LBT-2025-001',no_termin:'Termin 3',nilai_bersih:'142500000',nilai_retensi:'7500000',tanggal_tagih:'2025-06-30',tanggal_bayar:'',status:'Belum tagih',nama_proyek:'Studi Kelayakan Trans Batam'},
    {termin_id:'TRM-004',project_id:'LBT-2025-002',no_termin:'Termin 1',nilai_bersih:'213750000',nilai_retensi:'11250000',tanggal_tagih:'2025-04-01',tanggal_bayar:'2025-04-20',status:'Lunas',nama_proyek:'CBM Consultancy MRT Jakarta'},
  ],
  pinjaman:[
    {pinjaman_id:'INV-001',nama_investor:'Pak Hendra Wijaya',jumlah_pinjaman:'100000000',tanggal_cair:'2025-01-05',project_id:'LBT-2025-001',skema:'Bagi hasil',nilai_return:'15000000',total_kembali:'115000000',tanggal_jatuh_tempo:'2025-07-05',sudah_dibayar:'30000000',sisa_hutang:'85000000',status:'Aktif'},
    {pinjaman_id:'INV-002',nama_investor:'Bu Sari Kusuma',jumlah_pinjaman:'200000000',tanggal_cair:'2025-03-10',project_id:'LBT-2025-002',skema:'Bunga flat',nilai_return:'24000000',total_kembali:'224000000',tanggal_jatuh_tempo:'2025-09-10',sudah_dibayar:'0',sisa_hutang:'224000000',status:'Aktif'},
  ],
  akun:[
    {Akun_id:'Rek_001',Bank:'BCA Kg Bud','Saldo Awal':'500000','Saldo Aktual':'500000'},
    {Akun_id:'Rek_002',Bank:'Mandiri Sut','Saldo Awal':'500000','Saldo Aktual':'200000'},
    {Akun_id:'Rek_003',Bank:'BCA Rik','Saldo Awal':'500000','Saldo Aktual':'5000000'},
    {Akun_id:'Rek_004',Bank:'Jago Rik Reklame','Saldo Awal':'500000','Saldo Aktual':'1000000'},
    {Akun_id:'Rek_005',Bank:'Jago Rik Topo','Saldo Awal':'500000','Saldo Aktual':'1000000'},
  ],
  kontrak:[],profitsharing:[]
};

let D={};let CI={};let liveMode=false;

const idr=n=>{const a=Math.abs(n||0),s=n<0?'-':'';if(a>=1e9)return s+'Rp '+(Math.round(a/1e8)/10).toFixed(1)+' M';if(a>=1e6)return s+'Rp '+Math.round(a/1e6)+' Jt';if(a>=1e3)return s+'Rp '+(a/1e3).toFixed(0)+' Rb';return s+'Rp '+a};
const num=s=>{if(!s&&s!==0)return 0;return parseFloat(String(s).replace(/[Rp,. \u00a0]/g,'').replace(/[^0-9.\-]/g,''))||0};
const pc=(a,b)=>b?Math.round(a/b*100)+'%':'–';
const pmap={'Lunas':'pg','Sudah tagih':'pa','Belum tagih':'pr','Aktif':'pa','Selesai':'pg','Draft':'pr','Approved':'pg'};
const pill=(s)=>`<span class="pill ${pmap[s]||'pgr'}">${s||''}</span>`;

async function fetchSheet(name,gid){
  const url=`https://docs.google.com/spreadsheets/d/${SID}/export?format=csv&gid=${gid}`;
  return new Promise(res=>{
    Papa.parse(url,{download:true,header:true,skipEmptyLines:true,
      complete:r=>res({ok:true,name,rows:r.data}),
      error:()=>res({ok:false,name,rows:[]})
    });
  });
}

async function loadAll(){
  document.getElementById('dot').style.background='#facc15';
  document.getElementById('lupd').textContent='Mengambil data...';
  document.getElementById('srcBadge').textContent='● Connecting...';

  const results=await Promise.all(Object.entries(GID).map(([n,g])=>fetchSheet(n,g)));
  const anyOk=results.some(r=>r.ok&&r.rows.length>0);

  if(anyOk){
    results.forEach(r=>{if(r.rows.length>0)D[r.name]=r.rows;else D[r.name]=DEMO[r.name]||[]});
    liveMode=true;
    document.getElementById('srcBadge').innerHTML='● Live — Google Sheets';
    document.getElementById('srcBadge').style.background='rgba(74,222,128,.2)';
  } else {
    D={...DEMO};
    liveMode=false;
    document.getElementById('srcBadge').innerHTML='⚠ Demo — Sheets belum public';
    document.getElementById('srcBadge').style.cssText='background:rgba(251,191,36,.2);border-color:rgba(251,191,36,.5);color:#92400e;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500';
  }

  const sel=document.getElementById('sProj');
  sel.innerHTML='<option value="all">Semua Proyek</option>';
  (D.projects||[]).forEach(p=>{const o=document.createElement('option');o.value=p.project_id;o.textContent=p.nama_proyek;sel.appendChild(o)});

  renderAll();
  const now=new Date().toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  document.getElementById('lupd').textContent=(liveMode?'Live ':'Demo ')+'· '+now;
  document.getElementById('dot').style.background=liveMode?'#4ade80':'#facc15';
  document.getElementById('ft').style.display='block';
}

function gf(){
  const yr=document.getElementById('sYear').value;
  const pj=document.getElementById('sProj').value;
  const projects=(D.projects||[]).filter(p=>(pj==='all'||p.project_id===pj)&&(yr==='all'||p.tanggal_mulai?.startsWith(yr)||p.tanggal_selesai?.startsWith(yr)));
  const pids=projects.map(p=>p.project_id);
  return{
    projects,
    budget:(D.budget||[]).filter(b=>pids.includes(b.project_id)),
    transaksi:(D.transaksi||[]).filter(t=>pids.includes(t.project_id)),
    termin:(D.termin||[]).filter(t=>pids.includes(t.project_id)),
    pinjaman:(D.pinjaman||[]).filter(p=>pids.includes(p.project_id)),
    akun:D.akun||[],
  };
}

function cm(d){
  const revenue=d.termin.filter(t=>t.status==='Lunas').reduce((s,t)=>s+num(t.nilai_bersih),0);
  const potRev=d.projects.reduce((s,p)=>s+num(p.nilai_kontrak),0);
  const realBiaya=d.budget.reduce((s,b)=>s+num(b.nilai_realisasi),0);
  const rencanaBiaya=d.budget.reduce((s,b)=>s+num(b.nilai_rencana),0);
  const profit=revenue-realBiaya;
  const potProfit=potRev-rencanaBiaya;
  const totalPinj=d.pinjaman.reduce((s,p)=>s+num(p.jumlah_pinjaman),0);
  const sisaHutang=d.pinjaman.reduce((s,p)=>s+num(p.sisa_hutang),0);
  const retensi=d.termin.reduce((s,t)=>s+num(t.nilai_retensi),0);
  const retensiCair=d.termin.filter(t=>t.status==='Lunas').reduce((s,t)=>s+num(t.nilai_retensi),0);
  const pending=d.transaksi.filter(t=>t.status==='Draft').length;
  const outstanding=d.termin.filter(t=>t.status==='Sudah tagih').reduce((s,t)=>s+num(t.nilai_bersih),0);
  return{revenue,potRev,realBiaya,rencanaBiaya,profit,potProfit,totalPinj,sisaHutang,
    retensi,retensiCair,pending,outstanding,
    mAkt:revenue?Math.round(profit/revenue*100):0,
    mPot:potRev?Math.round(potProfit/potRev*100):0};
}

function mc(label,sub,val,note,ac){
  return`<div class="mc" style="--ac:var(${ac})"><div class="ml">${label}<span style="font-weight:400;font-size:10px;color:var(--tx2)"> · ${sub}</span></div><div class="mv">${val}</div><div class="ms">${note}</div></div>`;
}
function lg(c,l){return`<div class="lg"><div class="lgd" style="background:${c}"></div>${l}</div>`}

function buildWF(m){
  const items=[
    {l:'Pot. Revenue',v:m.potRev,c:'#B4B2A9'},
    {l:'Revenue Cair',v:m.revenue,c:'#3B6D11'},
    {l:'Real. Biaya',v:m.realBiaya,c:'#EF9F27'},
    {l:'Profit',v:m.profit,c:'#534AB7'},
    {l:'Pot. Profit',v:m.potProfit,c:'#0F6E56'},
  ];
  const mx=Math.max(...items.map(x=>Math.abs(x.v)),1);
  const H=120;
  return`<div class="wfw">${items.map(x=>{const h=Math.round(Math.abs(x.v)/mx*H);return`<div class="wfc"><div class="wfv">${idr(x.v)}</div><div class="wfb"><div class="wfbar" style="height:${h}px;background:${x.v<0?'#ef4444':x.c}"></div></div><div class="wfl">${x.l}</div></div>`}).join('')}</div>`;
}

function buildTerminTable(rows){
  if(!rows.length)return'<p style="font-size:11px;color:var(--tx2);padding:6px">Tidak ada data</p>';
  return`<table><thead><tr><th>Proyek</th><th>Termin</th><th>Nilai Bersih</th><th>Status</th><th>Tgl Bayar</th></tr></thead><tbody>${rows.map(t=>`<tr><td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.nama_proyek||t.project_id}">${(t.nama_proyek||t.project_id||'').substring(0,18)}</td><td>${t.no_termin||''}</td><td style="text-align:right;font-variant-numeric:tabular-nums">${idr(num(t.nilai_bersih))}</td><td>${pill(t.status)}</td><td style="color:var(--tx2)">${t.tanggal_bayar||'–'}</td></tr>`).join('')}</tbody></table>`;
}

function buildPinjaman(rows){
  if(!rows.length)return'<p style="font-size:11px;color:var(--tx2)">Tidak ada pinjaman</p>';
  return rows.map(p=>{
    const total=num(p.total_kembali)||num(p.jumlah_pinjaman);
    const bayar=num(p.sudah_dibayar);
    const pct=total?Math.round(bayar/total*100):0;
    const sisa=num(p.sisa_hutang)||(total-bayar);
    return`<div style="margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid var(--br)">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:500">${p.nama_investor}</span>${pill(p.status)}</div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tx2);margin-bottom:5px">
        <span>Modal: <b style="color:var(--tx)">${idr(num(p.jumlah_pinjaman))}</b></span>
        <span>Sisa: <b style="color:var(--r)">${idr(sisa)}</b></span>
        <span>JT: ${p.tanggal_jatuh_tempo||'–'}</span>
      </div>
      <div style="display:flex;align-items:center;gap:7px">
        <div class="pt"><div class="pf" style="width:${pct}%"></div></div>
        <span style="font-size:10px;color:var(--tx2)">${pct}%</span>
      </div>
      <div style="font-size:10px;color:var(--tx2);margin-top:2px">Skema: ${p.skema||'–'}</div>
    </div>`;
  }).join('');
}

function buildTrx(rows){
  if(!rows.length)return'<p style="font-size:11px;color:var(--tx2);padding:6px">Tidak ada transaksi</p>';
  const sorted=[...rows].sort((a,b)=>(b.tanggal||'').localeCompare(a.tanggal||'')).slice(0,8);
  return`<table><thead><tr><th>Tanggal</th><th>Proyek</th><th>Kategori</th><th>Jumlah</th><th>Status</th></tr></thead><tbody>${sorted.map(t=>`<tr><td style="color:var(--tx2)">${t.tanggal||''}</td><td style="color:var(--tx2)">${(t.project_id||'').replace('LBT-2025-','P')}</td><td>${t.kategori||''}</td><td style="text-align:right;font-variant-numeric:tabular-nums">${idr(num(t.jumlah))}</td><td>${pill(t.status)}</td></tr>`).join('')}</tbody></table>`;
}

function renderAll(){
  const d=gf();const m=cm(d);
  Object.values(CI).forEach(c=>c.destroy());CI={};

  document.getElementById('mc').innerHTML=`<div class="body">
    <div class="slbl">Ringkasan Finansial</div>
    <div class="mg">
      ${mc('Revenue','Termin Lunas',idr(m.revenue),`<b>${pc(m.revenue,m.potRev)}</b> dari nilai kontrak`,'--g2')}
      ${mc('Potensi Revenue','Total Nilai Kontrak',idr(m.potRev),`${d.projects.length} proyek aktif/selesai`,'--t')}
      ${mc('Profit Aktual','Revenue − Realisasi',idr(m.profit),`Margin <b>${m.mAkt}%</b>`,m.profit>=0?'--p':'--r')}
      ${mc('Potensi Profit','Kontrak − Anggaran',idr(m.potProfit),`Margin <b>${m.mPot}%</b>`,'--a')}
    </div>
    <div class="slbl">Monitoring Operasional</div>
    <div class="mg">
      ${mc('Pinjaman Aktif','Modal investor',idr(m.totalPinj),`${d.pinjaman.filter(p=>p.status==='Aktif').length} investor`,'--b')}
      ${mc('Sisa Hutang','Belum lunas',idr(m.sisaHutang),'Pokok + return','--r')}
      ${mc('Retensi Belum Cair','Tertahan dari termin',idr(m.retensi-m.retensiCair),'Cair setelah FHO','--a')}
      ${mc('Transaksi Pending','Menunggu approval',m.pending+' trx',`Outstanding: <b>${idr(m.outstanding)}</b>`,'--r')}
    </div>

    <div class="cg g21">
      <div class="card"><div class="ct">Waterfall — Revenue ke Profit</div>
        ${buildWF(m)}
        <div class="lgw">${lg('#3B6D11','Revenue')}${lg('#B4B2A9','Potensi')}${lg('#EF9F27','Realisasi Biaya')}${lg('#534AB7','Profit')}${lg('#0F6E56','Pot. Profit')}</div>
      </div>
      <div class="card"><div class="ct">Status Termin</div><div class="cws"><canvas id="cDonut"></canvas></div></div>
    </div>

    <div class="cg g2">
      <div class="card"><div class="ct">Revenue vs Potensi per Proyek</div><div class="cw"><canvas id="cRev"></canvas></div></div>
      <div class="card"><div class="ct">Realisasi Anggaran per Pos</div><div class="cw"><canvas id="cBudget"></canvas></div></div>
    </div>

    <div class="cg g2">
      <div class="card"><div class="ct">Status Termin Detail</div><div style="overflow-x:auto">${buildTerminTable(d.termin)}</div></div>
      <div class="card"><div class="ct">Status Pinjaman Investor</div>${buildPinjaman(d.pinjaman)}</div>
    </div>

    <div class="cg g2">
      <div class="card"><div class="ct">Profit Margin per Proyek</div><div class="cw"><canvas id="cMargin"></canvas></div></div>
      <div class="card"><div class="ct">Transaksi Terbaru</div><div style="overflow-x:auto">${buildTrx(d.transaksi)}</div></div>
    </div>

    <div class="cg">
      <div class="card"><div class="ct">Saldo Rekening</div>
        <div class="acg">${d.akun.map(a=>`<div class="ac"><div class="acn">${a.Bank||a.Akun_id}</div><div class="acv">${idr(num(a['Saldo Aktual']||a.saldo_aktual||0))}</div><div class="acs">Awal: ${idr(num(a['Saldo Awal']||a.saldo_awal||0))}</div></div>`).join('')}</div>
      </div>
    </div>
  </div>`;

  setTimeout(()=>{
    // Donut
    const cd=document.getElementById('cDonut');
    if(cd){
      const l=d.termin.filter(t=>t.status==='Lunas').reduce((s,t)=>s+num(t.nilai_bersih),0);
      const tg=d.termin.filter(t=>t.status==='Sudah tagih').reduce((s,t)=>s+num(t.nilai_bersih),0);
      const bl=d.termin.filter(t=>t.status==='Belum tagih').reduce((s,t)=>s+num(t.nilai_bersih),0);
      CI.donut=new Chart(cd,{type:'doughnut',data:{labels:['Lunas','Sudah Tagih','Belum Tagih'],datasets:[{data:[l,tg,bl],backgroundColor:['#3B6D11','#EF9F27','#E24B4A'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:6}},tooltip:{callbacks:{label:c=>` ${c.label}: ${idr(c.raw)}`}}}}});
    }
    // Revenue bar
    const cr=document.getElementById('cRev');
    if(cr){
      const lbs=d.projects.map(p=>p.nama_proyek?.substring(0,14)||p.project_id);
      const rv=d.projects.map(p=>d.termin.filter(t=>t.project_id===p.project_id&&t.status==='Lunas').reduce((s,t)=>s+num(t.nilai_bersih),0));
      const pt=d.projects.map(p=>num(p.nilai_kontrak));
      CI.rev=new Chart(cr,{type:'bar',data:{labels:lbs,datasets:[{label:'Revenue Cair',data:rv,backgroundColor:'#3B6D11',borderRadius:4},{label:'Potensi',data:pt,backgroundColor:'rgba(184,182,169,.45)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10}}}},scales:{y:{ticks:{callback:v=>idr(v),font:{size:10}},grid:{color:'#F0EFEB'}},x:{ticks:{font:{size:10}}}}}});
    }
    // Budget bar
    const cb=document.getElementById('cBudget');
    if(cb){
      const lbs=d.budget.map(b=>(b.project_id||'').replace('LBT-2025-0','')+':'+b.pos_biaya);
      CI.budget=new Chart(cb,{type:'bar',data:{labels:lbs,datasets:[{label:'Realisasi',data:d.budget.map(b=>num(b.nilai_realisasi)),backgroundColor:'#3B6D11',borderRadius:3},{label:'Rencana',data:d.budget.map(b=>num(b.nilai_rencana)),backgroundColor:'rgba(184,182,169,.4)',borderRadius:3}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10}}}},scales:{x:{ticks:{callback:v=>idr(v),font:{size:10}},grid:{color:'#F0EFEB'}},y:{ticks:{font:{size:10}}}}}});
    }
    // Margin bar
    const cmx=document.getElementById('cMargin');
    if(cmx){
      const lbs=d.projects.map(p=>p.nama_proyek?.substring(0,14)||p.project_id);
      const makt=d.projects.map(p=>{const rv=d.termin.filter(t=>t.project_id===p.project_id&&t.status==='Lunas').reduce((s,t)=>s+num(t.nilai_bersih),0);const by=d.budget.filter(b=>b.project_id===p.project_id).reduce((s,b)=>s+num(b.nilai_realisasi),0);return rv?Math.round((rv-by)/rv*100):0});
      const mpot=d.projects.map(p=>{const pt=num(p.nilai_kontrak);const rn=d.budget.filter(b=>b.project_id===p.project_id).reduce((s,b)=>s+num(b.nilai_rencana),0);return pt?Math.round((pt-rn)/pt*100):0});
      CI.margin=new Chart(cmx,{type:'bar',data:{labels:lbs,datasets:[{label:'Margin Aktual %',data:makt,backgroundColor:'#534AB7',borderRadius:4},{label:'Margin Potensi %',data:mpot,backgroundColor:'rgba(184,182,169,.45)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10}}}},scales:{y:{ticks:{callback:v=>v+'%',font:{size:10}},grid:{color:'#F0EFEB'}},x:{ticks:{font:{size:10}}}}}});
    }
  },60);
}

window.addEventListener('DOMContentLoaded',loadAll);
</script>
</body>
</html>
