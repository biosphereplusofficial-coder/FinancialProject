<html lang="id">
<head>
<meta charset="UTF-8">

<title>LabERP · Dashboard Keuangan Proyek</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --green:#27500A;--green2:#3B6D11;--green-l:#EAF3DE;
  --teal:#085041;--teal-l:#E1F5EE;
  --purple:#3C3489;--purple-l:#EEEDFE;
  --amber:#633806;--amber-l:#FAEEDA;
  --red:#A32D2D;--red-l:#FCEBEB;
  --blue:#0C447C;--blue-l:#E6F1FB;
  --gray:#888780;--gray-l:#F5F5F4;
  --tx:#1C1B19;--tx2:#5F5E5A;
  --border:#E5E3DC;--bg:#F7F6F2;--card:#FFFFFF;
  --r:10px;--sh:0 1px 4px rgba(0,0,0,.08)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);font-size:13px}
/* HEADER */
.hdr{background:var(--green);color:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr h1{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%;background:#facc15;display:inline-block;flex-shrink:0}
.hdr-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#lupd{font-size:11px;opacity:.75}
#countdown{font-size:10px;opacity:.5}
.rbtn{font-size:11px;padding:4px 11px;border-radius:5px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.12);color:#fff;cursor:pointer}
.rbtn:hover{background:rgba(255,255,255,.25)}
#badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500}
/* FILTER */
.fbar{background:var(--card);border-bottom:1px solid var(--border);padding:9px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.fbar label{font-size:11px;color:var(--tx2);font-weight:500}
.fbar select{font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer}
/* LAYOUT */
.body{padding:18px 20px;max-width:1380px;margin:0 auto}
.slbl{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin:0 0 9px}
/* METRIC GRID */
.mgrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:18px}
.mcard{background:var(--card);border-radius:var(--r);padding:13px 15px;border:1px solid var(--border);box-shadow:var(--sh);border-top:3px solid var(--mac)}
.mcard .mlabel{font-size:10px;color:var(--tx2);margin-bottom:5px;font-weight:500}
.mcard .mval{font-size:20px;font-weight:600;line-height:1.1}
.mcard .msub{font-size:10px;color:var(--tx2);margin-top:3px}
/* CHARTS */
.cgrid{display:grid;gap:14px;margin-bottom:18px}
.g2{grid-template-columns:repeat(2,minmax(0,1fr))}
.g21{grid-template-columns:minmax(0,1.6fr) minmax(0,1fr)}
.card{background:var(--card);border-radius:var(--r);padding:15px;border:1px solid var(--border);box-shadow:var(--sh)}
.ctitle{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.cw{position:relative;height:200px}
.cws{position:relative;height:165px}
/* TABLE */
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:6px 9px;background:var(--gray-l);color:var(--tx2);font-weight:600;font-size:10px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:6px 9px;border-bottom:1px solid var(--border);color:var(--tx);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAF8}
.pill{display:inline-block;font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500;white-space:nowrap}
.pg{background:var(--green-l);color:var(--green2)}
.pa{background:var(--amber-l);color:var(--amber)}
.pr{background:var(--red-l);color:var(--red)}
.pgr{background:var(--gray-l);color:var(--gray)}
/* PROGRESS */
.ptrack{flex:1;height:6px;background:var(--gray-l);border-radius:3px;overflow:hidden;min-width:50px}
.pfill{height:100%;border-radius:3px;background:var(--blue)}
/* WATERFALL */
.wfw{display:flex;align-items:flex-end;gap:5px;height:130px;margin-top:4px}
.wfc{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0}
.wfbw{flex:1;display:flex;align-items:flex-end;width:100%}
.wfbar{width:100%;border-radius:3px 3px 0 0;min-height:3px}
.wfv{font-size:9px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.wfl{font-size:9px;color:var(--tx2);text-align:center;line-height:1.2}
.lgw{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.lgitem{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--tx2)}
.lgdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
/* WARN */
.warn{background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:12px;color:#92400E;display:flex;gap:8px}
/* AKUN */
.acgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px}
.acard{background:var(--gray-l);border-radius:8px;padding:11px 13px;border:1px solid var(--border)}
/* PROGRESS BAR TOP */
#pbar{height:3px;background:var(--green);width:0%;position:fixed;top:0;left:0;z-index:999;transition:width .4s}
/* RESPONSIVE */
@media(max-width:860px){.mgrid{grid-template-columns:repeat(2,1fr)}.g2,.g21{grid-template-columns:1fr}.body{padding:12px}}
@media(max-width:480px){.mgrid{grid-template-columns:1fr}}
footer{text-align:center;padding:16px;font-size:11px;color:var(--tx2);border-top:1px solid var(--border);margin-top:4px}
footer a{color:var(--green)}
</style>
</head>

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
var D = {};
var charts = {};
var isLive = false;

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
function idr(n) {
  var a = Math.abs(n||0), s = n < 0 ? '-' : '';
  if(a >= 1e9) return s+'Rp '+(Math.round(a/1e8)/10).toFixed(1)+' M';
  if(a >= 1e6) return s+'Rp '+Math.round(a/1e6)+' Jt';
  if(a >= 1e3) return s+'Rp '+(a/1e3).toFixed(0)+' Rb';
  return s+'Rp '+a;
}
function toNum(s) {
  if(s === null || s === undefined || s === '' || s === '#ERROR!') return 0;
  var str = String(s).trim();
  // Strip currency prefix "Rp" (with or without space/dot)
  str = str.replace(/^Rp\.?\s*/i, '');
  // Strip thousand separators (commas) and spaces
  str = str.replace(/[,\s\u00a0]/g, '');
  // Strip % sign
  str = str.replace(/%/g, '');
  return parseFloat(str) || 0;
}
function pctStr(a, b) { return b ? Math.round(a/b*100)+'%' : '–'; }

// Normalize row keys: "Saldo Aktual" → saldo_aktual, handles gviz/tq variants
function normalizeRow(row) {
  var out = {};
  Object.keys(row).forEach(function(k) {
    var nk = k.trim().toLowerCase().replace(/\s+/g, '_');
    out[nk] = row[k];
    out[k]  = row[k]; // keep original too
  });
  return out;
}

// Safe field getter — tries multiple variants of a field name
function get(row, field) {
  if(!row) return '';
  // Try exact, then lowercase_underscore, then lowercase with space, then uppercase first
  var variants = [
    field,
    field.toLowerCase().replace(/\s+/g,'_'),
    field.toLowerCase(),
    field.replace(/_/g,' '),
    field.toLowerCase().replace(/_/g,' '),
  ];
  for(var i=0; i<variants.length; i++) {
    if(row[variants[i]] !== undefined && row[variants[i]] !== null) return row[variants[i]];
  }
  return '';
}


function pillHtml(status) {
  var map = {Lunas:'pg','Sudah tagih':'pa','Belum tagih':'pr',Aktif:'pa',Selesai:'pg',Draft:'pr',Approved:'pg',Pending:'pa'};
  return '<span class="pill '+(map[status]||'pgr')+'">'+( status||'')+'</span>';
}
function lgHtml(color, label) {
  return '<div class="lgitem"><div class="lgdot" style="background:'+color+'"></div>'+label+'</div>';
}
function metricCard(label, sub, val, note, color) {

    +'</div>';
}

// ═══════════════════════════════════════════════════════════════
// FETCH
// ═══════════════════════════════════════════════════════════════
function fetchSheet(name, gid) {
  var urls = [
    'https://docs.google.com/spreadsheets/d/'+SID+'/gviz/tq?tqx=out:csv&gid='+gid,
    'https://docs.google.com/spreadsheets/d/'+SID+'/export?format=csv&gid='+gid,
  ];
  return new Promise(function(resolve) {
    var tried = 0;
    function tryNext() {
      if(tried >= urls.length) { resolve({name:name, rows:[], ok:false}); return; }
      var url = urls[tried++];
      var timer = setTimeout(function(){ tryNext(); }, 8000);
      Papa.parse(url, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(r) {
          clearTimeout(timer);
          if(r.data && r.data.length > 0) {
            var normalized = r.data.map(normalizeRow);
            resolve({name:name, rows:normalized, ok:true});
          } else tryNext();
        },
        error: function() { clearTimeout(timer); tryNext(); }
      });
    }
    tryNext();
  });
}

// ═══════════════════════════════════════════════════════════════
// LOAD
// ═══════════════════════════════════════════════════════════════
async function loadAll() {
  // Show demo instantly — never blank
  if(Object.keys(D).length === 0) {
    D = JSON.parse(JSON.stringify(DEMO));
    buildProjectFilter();
    renderAll();
  }
  setBadge('loading', '⟳ Mengambil data...');
  setPbar(30);

  var results = await Promise.all(SHEETS.map(function(s){ return fetchSheet(s.name, s.gid); }));
  var liveCount = results.filter(function(r){ return r.ok; }).length;
  isLive = liveCount > 0;

  results.forEach(function(r) {
    D[r.name] = (r.ok && r.rows.length > 0) ? r.rows : (DEMO[r.name] || []);
  });

  buildProjectFilter();
  renderAll();
  setPbar(100);

  var now = new Date().toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  document.getElementById('lupd').textContent = now;
  document.getElementById('footer').style.display = 'block';

  if(isLive) {
    setBadge('live', '● Live · '+liveCount+'/'+SHEETS.length+' sheets');
    document.getElementById('dot').style.background = '#4ade80';
  } else {
    setBadge('demo', '⚠ Demo Mode');
    document.getElementById('dot').style.background = '#facc15';
  }
}

function buildProjectFilter() {
  var sel = document.getElementById('sProj');
  var cur = sel.value;
  sel.innerHTML = '<option value="all">Semua Proyek</option>';
  (D.projects||[]).forEach(function(p) {
    var o = document.createElement('option');
    o.value = get(p,'project_id');
    o.textContent = get(p,'nama_proyek');
    if(get(p,'project_id')===cur || get(p,'nama_proyek')===cur) o.selected = true;
    sel.appendChild(o);
  });
}

function setBadge(type, text) {
  var el = document.getElementById('badge');
  var styles = {
    loading: 'background:rgba(250,204,21,.2);border:1px solid rgba(250,204,21,.4);color:#92400e',
    live:    'background:rgba(74,222,128,.2);border:1px solid rgba(74,222,128,.4);color:#166534',
    demo:    'background:rgba(251,191,36,.2);border:1px solid rgba(251,191,36,.5);color:#92400e',
  };
  el.style.cssText = styles[type] || styles.demo;
  el.textContent = text || '';
}

function setPbar(pct) {
  var bar = document.getElementById('pbar');
  if(!bar) return;
  bar.style.width = pct+'%';
  if(pct >= 100) setTimeout(function(){ bar.style.opacity='0'; }, 600);
  else bar.style.opacity = '1';
}

// ═══════════════════════════════════════════════════════════════
// FILTER DATA
// ═══════════════════════════════════════════════════════════════
function getFiltered() {
  var yr = document.getElementById('sYear').value;
  var pj = document.getElementById('sProj').value;

  var projects = (D.projects||[]).filter(function(p) {
    var tm = get(p,'tanggal_mulai'), ts = get(p,'tanggal_selesai'), pid = get(p,'project_id');
    // Support DD/MM/YYYY (16/02/2026) and YYYY-MM-DD
    var inYear = yr==='all'
      || tm.slice(-4)===yr || ts.slice(-4)===yr   // DD/MM/YYYY ends with year
      || tm.indexOf(yr)===0 || ts.indexOf(yr)===0  // YYYY-MM-DD starts with year
      || pid.indexOf(yr)>=0;                        // LBT-2026-001
    var inProj = pj==='all' || pid===pj || p.nama_proyek===pj;
    return inYear && inProj;
  });

  // Build lookup by nama_proyek (primary join key — no project_id in child sheets)
  var pnames = {};
  projects.forEach(function(p){ if(p.nama_proyek) pnames[p.nama_proyek.trim()]=p; });

  function byName(row) {
    var n = (get(row,'nama_proyek')||'').trim();
    return !!pnames[n];
  }

  // pinjaman.nama_proyek contains project_id (e.g. "LBT-2025-001"), not nama_proyek
  // build project_id lookup too
  var pidMap = {};
  projects.forEach(function(p){ var pid=get(p,'project_id'); if(pid) pidMap[pid.trim()]=true; });

  function byNameOrId(row) {
    var n  = (get(row,'nama_proyek')||'').trim();
    return !!pnames[n] || !!pidMap[n];
  }

  return {
    projects:  projects,
    budget:    (D.budget||[]).filter(byName),
    transaksi: (D.transaksi||[]).filter(byName),
    termin:    (D.termin||[]).filter(byName),
    pinjaman:  (D.pinjaman||[]).filter(byNameOrId),
    akun:      D.akun || [],
  };
}

// ═══════════════════════════════════════════════════════════════
// COMPUTE METRICS
// ═══════════════════════════════════════════════════════════════
function computeMetrics(d) {
  var revenue=0, potRev=0, realBiaya=0, rencanaBiaya=0;
  var totalPinj=0, sisaHutang=0, retensi=0, retensiCair=0;
  var pending=0, outstanding=0;

  // Termin: nilai_bersih, status
  d.termin.forEach(function(t) {
    var nb = toNum(t.nilai_bersih);
    if(t.status==='Lunas')       { revenue += nb; }
    if(t.status==='Sudah tagih')   outstanding += nb;
  });

  // Projects: nilai_kontrak
  d.projects.forEach(function(p){ potRev += toNum(p.nilai_kontrak); });

  // Budget: nilai_rencana, nilai_realisasi
  d.budget.forEach(function(b){
    realBiaya    += toNum(b.nilai_realisasi);
    rencanaBiaya += toNum(b.nilai_rencana);
  });

  // Pinjaman: jumlah_pinjaman, sisa_hutang
  d.pinjaman.forEach(function(p){
    totalPinj  += toNum(p.jumlah_pinjaman);
    sisaHutang += toNum(p.sisa_hutang);
  });

  // Transaksi: status (no Draft in current data — use jenis=Keluar without status as pending)
  d.transaksi.forEach(function(t){
    if(t.status==='Draft') pending++;
  });

  return {
    revenue:revenue, potRev:potRev,
    realBiaya:realBiaya, rencanaBiaya:rencanaBiaya,
    profit:revenue-realBiaya, potProfit:potRev-rencanaBiaya,
    totalPinj:totalPinj, sisaHutang:sisaHutang,
    retensi:retensi, retensiCair:retensiCair,
    pending:pending, outstanding:outstanding,
    mAkt: revenue ? Math.round((revenue-realBiaya)/revenue*100) : 0,
    mPot: potRev  ? Math.round((potRev-rencanaBiaya)/potRev*100)  : 0,
  };
}

// ═══════════════════════════════════════════════════════════════
// WATERFALL
// ═══════════════════════════════════════════════════════════════
function buildWaterfall(m) {
  var items = [
    {l:'Pot.Rev', v:m.potRev,      c:'#B4B2A9'},
    {l:'Revenue', v:m.revenue,     c:'#3B6D11'},
    {l:'Biaya',   v:m.realBiaya,   c:'#EF9F27'},
    {l:'Profit',  v:m.profit,      c:'#534AB7'},
    {l:'Pot.Profit',v:m.potProfit, c:'#0F6E56'},
  ];
  var maxV = 1;
  items.forEach(function(x){ if(Math.abs(x.v)>maxV) maxV=Math.abs(x.v); });
  var html = '<div class="wfw">';
  items.forEach(function(x) {
    var h = Math.round(Math.abs(x.v)/maxV*120);
    var col = x.v < 0 ? '#ef4444' : x.c;
    html += '<div class="wfc">'
      +'<div class="wfv">'+idr(x.v)+'</div>'
      +'<div class="wfbw"><div class="wfbar" style="height:'+h+'px;background:'+col+'"></div></div>'
      +'<div class="wfl">'+x.l+'</div>'
      +'</div>';
  });
  return html + '</div>';
}

// ═══════════════════════════════════════════════════════════════
// TABLE BUILDERS
// ═══════════════════════════════════════════════════════════════
function buildTerminTable(rows) {
  if(!rows.length) return '<p style="font-size:11px;color:var(--tx2);padding:6px">Tidak ada data termin</p>';
  var html = '<table><thead><tr>'
    +'<th>Proyek</th><th>No Termin</th>'
    +'<th style="text-align:right">Nilai Tagih</th>'
    +'<th style="text-align:right">Nilai Bersih</th>'
    +'<th>Status</th><th>Tgl Bayar</th>'
    +'</tr></thead><tbody>';
  rows.forEach(function(t) {
    html += '<tr>'
      +'<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+(t.nama_proyek||'')+'">'+(t.nama_proyek||'').substring(0,16)+'</td>'
      +'<td>'+get(t,'no_termin')+'</td>'
      +'<td style="text-align:right">'+idr(toNum(get(t,'nilai_tagih')))+'</td>'
      +'<td style="text-align:right;font-weight:500">'+idr(toNum(get(t,'nilai_bersih')))+'</td>'
      +'<td>'+pillHtml(get(t,'status'))+'</td>'
      +'<td style="color:var(--tx2)">'+(get(t,'tanggal_bayar')||'–')+'</td>'
      +'</tr>';
  });
  return html + '</tbody></table>';
}

function buildPinjaman(rows) {
  if(!rows.length) return '<p style="font-size:11px;color:var(--tx2)">Tidak ada pinjaman aktif</p>';
  var html = '';
  rows.forEach(function(p) {
    var modal = toNum(get(p,'jumlah_pinjaman'));
    var total = toNum(get(p,'total_kembali')) || modal;
    var bayar = toNum(get(p,'sudah_dibayar'));
    var sisa  = toNum(get(p,'sisa_hutang')) || (total - bayar);
    var pct   = total ? Math.round(bayar/total*100) : 0;
    html += '<div style="margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid var(--border)">'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:3px">'
        +'<span style="font-size:12px;font-weight:500">'+get(p,'nama_investor')+'</span>'
        +pillHtml(get(p,'status'))
      +'</div>'
      +'<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tx2);margin-bottom:5px">'
        +'<span>Modal: <b style="color:var(--tx)">'+idr(modal)+'</b></span>'
        +'<span>Sisa: <b style="color:var(--red)">'+idr(sisa)+'</b></span>'
        +'<span>JT: '+(get(p,'tanggal_jatuh_tempo')||'–')+'</span>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:7px">'
        +'<div class="ptrack"><div class="pfill" style="width:'+pct+'%"></div></div>'
        +'<span style="font-size:10px;color:var(--tx2)">'+pct+'% terbayar</span>'
      +'</div>'
      +'<div style="font-size:10px;color:var(--tx2);margin-top:2px">'
        +'Skema: '+(get(p,'skema')||'–')+' · Proyek: '+(get(p,'nama_proyek')||'–')
      +'</div>'
    +'</div>';
  });
  return html;
}

function buildTrx(rows) {
  if(!rows.length) return '<p style="font-size:11px;color:var(--tx2);padding:6px">Tidak ada transaksi</p>';
  // Sort by tanggal desc, take 10 latest
  var sorted = rows.slice().sort(function(a,b){
    return (b.tanggal||'').localeCompare(a.tanggal||'');
  }).slice(0,10);
  var html = '<table><thead><tr>'
    +'<th>Tanggal</th><th>Proyek</th><th>Kategori</th>'
    +'<th>Keterangan</th>'
    +'<th style="text-align:right">Jumlah</th><th>Jenis</th>'
    +'</tr></thead><tbody>';
  sorted.forEach(function(t) {
    var jenis = get(t,'jenis')||'';
    var jClass = jenis==='Masuk' ? 'pg' : jenis==='Keluar' ? 'pr' : 'pgr';
    var desc = get(t,'deskripsi')||get(t,'Sumber')||get(t,'sumber')||'';
    html += '<tr>'
      +'<td style="color:var(--tx2);white-space:nowrap">'+get(t,'tanggal')+'</td>'
      +'<td style="color:var(--tx2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+get(t,'nama_proyek')+'">'+get(t,'nama_proyek').substring(0,12)+'</td>'
      +'<td style="white-space:nowrap">'+get(t,'kategori')+'</td>'
      +'<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--tx2)" title="'+desc+'">'+desc+'</td>'
      +'<td style="text-align:right;font-variant-numeric:tabular-nums">'+idr(toNum(get(t,'jumlah')))+'</td>'
      +'<td><span class="pill '+jClass+'">'+jenis+'</span></td>'
      +'</tr>';
  });
  return html + '</tbody></table>';
}

function buildBudgetBars(rows) {
  if(!rows.length) return '<p style="font-size:11px;color:var(--tx2);padding:6px">Tidak ada data anggaran</p>';
  var maxR = 1;
  rows.forEach(function(b){ var r=toNum(get(b,'nilai_rencana')); if(r>maxR) maxR=r; });
  var html = '<div style="padding:4px 0">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">'
    +'<div style="width:130px;flex-shrink:0"></div>'
    +'<div style="flex:1;display:flex;gap:12px">'
    +'<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--tx2)"><div style="width:10px;height:10px;border-radius:2px;background:#3B6D11"></div>Realisasi</div>'
    +'<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--tx2)"><div style="width:10px;height:10px;border-radius:2px;background:rgba(184,182,169,.5)"></div>Rencana</div>'
    +'</div><div style="width:60px;flex-shrink:0"></div><div style="width:36px;flex-shrink:0"></div>'
    +'</div>';
  rows.forEach(function(b) {
    var rencana   = toNum(get(b,'nilai_rencana'));
    var realisasi = toNum(get(b,'nilai_realisasi'));
    var pct       = rencana ? Math.round(realisasi/rencana*100) : 0;
    var rBarW     = Math.round(rencana/maxR*100);
    var eBarW     = rencana ? Math.round(realisasi/maxR*100) : 0;
    var pctColor  = pct>100?'#A32D2D':pct>70?'#633806':'#3B6D11';
    var proj      = get(b,'nama_proyek').substring(0,10);
    var pos       = get(b,'pos_biaya')||'?';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
      +'<div style="width:130px;flex-shrink:0;font-size:10px;color:var(--tx2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+proj+' · '+pos+'">'+proj+' · '+pos+'</div>'
      +'<div style="flex:1;position:relative;height:14px;background:var(--gray-l);border-radius:3px">'
        +'<div style="position:absolute;left:0;top:0;height:100%;width:'+rBarW+'%;background:rgba(184,182,169,.45);border-radius:3px"></div>'
        +'<div style="position:absolute;left:0;top:0;height:100%;width:'+eBarW+'%;background:'+pctColor+';border-radius:3px"></div>'
      +'</div>'
      +'<div style="width:60px;flex-shrink:0;font-size:10px;color:var(--tx2);text-align:right">'+idr(realisasi)+'</div>'
      +'<div style="width:36px;flex-shrink:0;font-size:11px;font-weight:700;text-align:right;color:'+pctColor+'">'+pct+'%</div>'
    +'</div>';
  });
  return html + '</div>';
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function renderAll() {
  var d = getFiltered();
  var m = computeMetrics(d);

  // Destroy old charts
  Object.keys(charts).forEach(function(k){ try{ charts[k].destroy(); }catch(e){} });
  charts = {};

  var warn = !isLive
    ? '<div class="warn"><span>⚠</span><div>Dashboard berjalan dalam <b>Demo Mode</b>. Pastikan spreadsheet di-set <b>Anyone with the link → Viewer</b> DAN sudah di-<b>Publish to web</b> (File → Share → Publish to web), lalu klik Refresh.</div></div>'
    : '';
  // Debug info
  var debugHtml = '';

  document.getElementById('dashboard').innerHTML =
    '<div class="body">'
    + warn + debugHtml

    // ROW 1: Financial metrics
    + '<div class="slbl">Ringkasan Finansial</div>'
    + '<div class="mgrid">'
    + metricCard('Revenue','Termin Lunas', idr(m.revenue), '<b>'+pctStr(m.revenue,m.potRev)+'</b> dari nilai kontrak', '#3B6D11')
    + metricCard('Potensi Revenue','Total Nilai Kontrak', idr(m.potRev), d.projects.length+' proyek', '#085041')
    + metricCard('Profit Aktual','Revenue − Realisasi', idr(m.profit), 'Margin <b>'+m.mAkt+'%</b>', m.profit>=0?'#3C3489':'#A32D2D')
    + metricCard('Potensi Profit','Kontrak − Anggaran', idr(m.potProfit), 'Margin <b>'+m.mPot+'%</b>', '#633806')
    + '</div>'

    // ROW 2: Operational metrics
    + '<div class="slbl">Monitoring Operasional</div>'
    + '<div class="mgrid">'
    + metricCard('Pinjaman Aktif','Modal investor', idr(m.totalPinj), d.pinjaman.filter(function(p){return p.status==='Aktif';}).length+' investor aktif', '#0C447C')
    + metricCard('Sisa Hutang','Belum lunas', idr(m.sisaHutang), 'Pokok + return', '#A32D2D')
    + metricCard('Retensi Belum Cair','Tertahan', idr(m.retensi-m.retensiCair), 'Cair setelah FHO', '#633806')
    + metricCard('Transaksi Pending','Menunggu approval', m.pending+' transaksi', 'Outstanding: <b>'+idr(m.outstanding)+'</b>', '#A32D2D')
    + '</div>'

    // ROW 3: Waterfall + Donut
    + '<div class="cgrid g21">'
    + '<div class="card"><div class="ctitle">Waterfall — Revenue ke Profit</div>'
    + buildWaterfall(m)
    + '<div class="lgw">'
    + lgHtml('#3B6D11','Revenue Cair') + lgHtml('#B4B2A9','Potensi') + lgHtml('#EF9F27','Realisasi Biaya')
    + lgHtml('#534AB7','Profit Aktual') + lgHtml('#0F6E56','Potensi Profit')
    + '</div></div>'
    + '<div class="card"><div class="ctitle">Komposisi Status Termin</div><div class="cws"><canvas id="cDonut"></canvas></div></div>'
    + '</div>'

    // ROW 4: Revenue bar + Budget bar
    + '<div class="cgrid g2">'
    + '<div class="card"><div class="ctitle">Revenue vs Potensi per Proyek</div><div class="cw"><canvas id="cRev"></canvas></div></div>'
    + '<div class="card"><div class="ctitle">Realisasi Anggaran per Pos</div><div class="cw"><canvas id="cBudget"></canvas></div></div>'
    + '</div>'

    // ROW 5: Termin table + Pinjaman
    + '<div class="cgrid g2">'
    + '<div class="card"><div class="ctitle">Status Termin</div><div style="overflow-x:auto">'+buildTerminTable(d.termin)+'</div></div>'
    + '<div class="card"><div class="ctitle">Status Pinjaman Investor</div>'+buildPinjaman(d.pinjaman)+'</div>'
    + '</div>'

    // ROW 6: Margin + Transaksi
    + '<div class="cgrid g2">'
    + '<div class="card"><div class="ctitle">Profit Margin per Proyek</div><div class="cw"><canvas id="cMargin"></canvas></div></div>'
    + '<div class="card"><div class="ctitle">Transaksi Terbaru</div><div style="overflow-x:auto">'+buildTrx(d.transaksi)+'</div></div>'
    + '</div>'

    // ROW 7: Saldo akun
    + '<div class="cgrid">'
    + '<div class="card"><div class="ctitle">Saldo Rekening</div>'
    + '<div class="acgrid">'
    + d.akun.map(function(a){
        // Exact columns: Akun_id, Nama_Akun, Saldo Awal, Saldo Aktual
        var nama   = get(a,'nama_akun')  || get(a,'Nama_Akun')  || get(a,'akun_id') || '';
        var aktual = toNum(get(a,'saldo_aktual') || get(a,'Saldo Aktual') || 0);
        var awal   = toNum(get(a,'saldo_awal')   || get(a,'Saldo Awal')   || 0);
        var diff = aktual - awal;
        var diffColor = diff >= 0 ? 'var(--green2)' : 'var(--red)';
        return '<div class="acard">'
          +'<div style="font-size:10px;color:var(--tx2);margin-bottom:3px">'+nama+'</div>'
          +'<div style="font-size:15px;font-weight:600">'+idr(aktual)+'</div>'
          +'<div style="font-size:10px;color:'+diffColor+';margin-top:2px">'
            +(diff>=0?'▲ +':'▼ ')+idr(diff)+' dari awal'
          +'</div>'
          +'</div>';
      }).join('')
    + '</div></div></div>'

    + '</div>'; // end .body

  // Render charts after DOM update
  setTimeout(function(){
    renderCharts(d, m);
    var bb = document.getElementById('budgetBars');
    if(bb) bb.innerHTML = buildBudgetBars(d.budget);
  }, 80);
}

// ═══════════════════════════════════════════════════════════════
// CHARTS
// ═══════════════════════════════════════════════════════════════
function renderCharts(d, m) {
  // Donut
  var cdEl = document.getElementById('cDonut');
  if(cdEl) {
    var lu=0, tg=0, bl=0;
    d.termin.forEach(function(t){
      var v = toNum(t.nilai_bersih);
      if(t.status==='Lunas') lu+=v;
      else if(t.status==='Sudah tagih') tg+=v;
      else bl+=v;
    });
    charts.donut = new Chart(cdEl, {
      type:'doughnut',
      data:{labels:['Lunas','Sudah Tagih','Belum Tagih'],
        datasets:[{data:[lu,tg,bl],backgroundColor:['#3B6D11','#EF9F27','#E24B4A'],borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:6}},
          tooltip:{callbacks:{label:function(c){return ' '+c.label+': '+idr(c.raw);}}}}}
    });
  }

  // Revenue bar
  var crEl = document.getElementById('cRev');
  if(crEl) {
    var lbs=[], rv=[], pt=[];
    d.projects.forEach(function(p){
      lbs.push(get(p,'nama_proyek').substring(0,16));
      var r=0, pn=get(p,'nama_proyek').trim();
      d.termin.forEach(function(t){
        if(get(t,'nama_proyek').trim()===pn && get(t,'status')==='Lunas') r+=toNum(get(t,'nilai_bersih'));
      });
      rv.push(r);
      pt.push(toNum(get(p,'nilai_kontrak')));
    });
    charts.rev = new Chart(crEl, {
      type:'bar',
      data:{labels:lbs,datasets:[
        {label:'Revenue Cair',data:rv,backgroundColor:'#3B6D11',borderRadius:4},
        {label:'Potensi',data:pt,backgroundColor:'rgba(184,182,169,.45)',borderRadius:4}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{font:{size:10}}}},
        scales:{y:{ticks:{callback:function(v){return idr(v);},font:{size:10}},grid:{color:'#F0EFEB'}},x:{ticks:{font:{size:10}}}}}
    });
  }

  // Budget bar
  // Budget rendered inline via buildBudgetBars() in renderAll

  // Margin bar
  var cmEl = document.getElementById('cMargin');
  if(cmEl) {
    var lbs3=[], makt=[], mpot=[];
    d.projects.forEach(function(p){
      lbs3.push(get(p,'nama_proyek').substring(0,16));
      var rv2=0, by=0, pt2=toNum(p.nilai_kontrak), rn=0;
      var pn2 = get(p,'nama_proyek').trim();
      d.termin.forEach(function(t){
        if(get(t,'nama_proyek').trim()===pn2 && get(t,'status')==='Lunas') rv2+=toNum(get(t,'nilai_bersih'));
      });
      d.budget.forEach(function(b){
        if(get(b,'nama_proyek').trim()===pn2){
          by+=toNum(get(b,'nilai_realisasi'));
          rn+=toNum(get(b,'nilai_rencana'));
        }
      });
      makt.push(rv2 ? Math.round((rv2-by)/rv2*100) : 0);
      mpot.push(pt2 ? Math.round((pt2-rn)/pt2*100) : 0);
    });
    charts.margin = new Chart(cmEl, {
      type:'bar',
      data:{labels:lbs3,datasets:[
        {label:'Margin Aktual %',data:makt,backgroundColor:'#534AB7',borderRadius:4},
        {label:'Margin Potensi %',data:mpot,backgroundColor:'rgba(184,182,169,.45)',borderRadius:4}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{font:{size:10}}}},
        scales:{y:{ticks:{callback:function(v){return v+'%';},font:{size:10}},grid:{color:'#F0EFEB'}},x:{ticks:{font:{size:10}}}}}
    });
  }
}

// ═══════════════════════════════════════════════════════════════
// AUTO REFRESH
// ═══════════════════════════════════════════════════════════════
var REFRESH_SEC = 30;
var cdSec = REFRESH_SEC;
var refreshTimer = null;

function startAutoRefresh() {
  clearInterval(refreshTimer);
  cdSec = REFRESH_SEC;
  refreshTimer = setInterval(function() {
    cdSec--;
    var el = document.getElementById('countdown');
    if(el) el.textContent = '⟳ '+cdSec+'s';
    if(cdSec <= 0) {
      cdSec = REFRESH_SEC;
      loadAll();
    }
  }, 1000);
}

function manualRefresh() {
  clearInterval(refreshTimer);
  loadAll().then(function(){ startAutoRefresh(); });
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', function() {
  loadAll().then(function(){ startAutoRefresh(); });
});
